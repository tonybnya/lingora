<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Lost in Translation | Lingora</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Space+Mono:wght@400;700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <link href="{{ url_for('static', path='/css/404.css') }}" rel="stylesheet">
    <link rel="icon" type="image/png" href="{{ url_for('static', path='/images/favicon.png') }}">
</head>
<body>
  <div class="grid-overlay"></div>

  <div class="error-container">
    <a href="/" class="error-logo" aria-label="Lingora home">
      <img src="{{ url_for('static', path='/images/logo.png') }}" alt="Lingora" width="80" height="80" decoding="async">
    </a>
    <div class="error-code">404</div>
    <div class="error-card">
      <span class="label">Error</span>
      <h1 class="error-title">Lost in<br><span class="accent">Translation</span></h1>
      <div class="glitch-line"></div>
      <p class="error-desc">
          The page you're looking for doesn't exist. It might have been moved, deleted, or perhaps it was never here to begin with.
      </p>
      <div class="error-actions">
        <a href="/" class="btn btn-primary">
          <span>Return Home</span>
          <span class="btn-icon">←</span>
        </a>
        <a href="/translator" class="btn btn-outline">
          <span>Try Translator</span>
          <span class="btn-icon">→</span>
        </a>
      </div>
    </div>
  </div>
</body>
</html>
