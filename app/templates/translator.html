<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Translator — Lingora | AI Translation Service</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Space+Mono:wght@400;700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <link href="{{ url_for('static', path='/css/translator.css') }}" rel="stylesheet">
</head>
<body>

    <div class="grid-overlay"></div>

    <nav>
        <a href="/" class="nav-logo">Lingora</a>
        <ul class="nav-links">
            <li><a href="/">Home</a></li>
            <li><a href="#">API</a></li>
            <li><a href="#">Docs</a></li>
        </ul>
    </nav>

    <div class="container">

        <!-- Main Translation Interface -->
        <div class="glass-panel">
            <span class="section-label">Translation Service</span>
            <h1 class="section-title"><span class="accent">Translate</span> your Text</h1>

            <form id="translator-form">
                <!-- Text Input -->
                <div class="form-group">
                    <label for="input-text" class="form-label">Text to Translate</label>
                    <textarea id="input-text" class="form-textarea" placeholder="Enter your text here..."></textarea>
                </div>

                <!-- Languages Input -->
                <div class="form-group">
                    <label for="languages" class="form-label">Languages (comma-separated)</label>
                    <input type="text" id="languages" class="form-input" placeholder="e.g. French, Spanish, Japanese">
                </div>

                <!-- Translate Button -->
                <button type="submit" class="btn btn-primary">Translate</button>
            </form>
        </div>

        <!-- Results Section -->
        <div id="results" class="glass-panel results-area">
            <span class="section-label">Results</span>
            <h2 class="section-title">Your <span class="accent">Translations</span></h2>
            <!-- Results will be dynamically inserted here -->
            <div class="result-card">
                <div class="result-header">
                    <span class="result-lang">FR — French</span>
                </div>
                <div class="result-text">
                    Voici un exemple de traduction automatique en français pour démonstration.
                </div>
            </div>
        </div>

        <!-- Check Translation Status -->
        <div class="glass-panel">
            <span class="section-label">Check Status</span>
            <h2 class="section-title">Check <span class="accent">Translation</span> Status</h2>

            <form id="id-check-form">
                <div class="form-group id-check-group">
                    <div class="form-group" style="flex-grow: 1; margin-bottom: 0;">
                        <label for="translation-id" class="form-label">Enter Translation ID</label>
                        <input type="text" id="translation-id" class="form-input" placeholder="e.g. 12345">
                    </div>
                    <div style="display: flex; gap: 12px;">
                        <button type="submit" class="btn btn-outline">Check Status</button>
                        <button type="button" class="btn btn-outline">Check Content</button>
                    </div>
                </div>
            </form>
        </div>

    </div>

    <div class="translator-footer">
        <p>&copy; <span id="footer-year"></span> Lingora. Built with FastAPI & OpenAI. <a href="https://github.com/tonybnya/lingora" target="_blank">View on GitHub</a></p>
    </div>

    <script src="{{ url_for('static', path='/js/translator.js') }}"></script>
</body>
</html>
